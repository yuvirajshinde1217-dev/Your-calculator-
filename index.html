<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
 <link rel="manifest" href="manifest.json">
  <script src="https://pl29008910.profitablecpmratenetwork.com/42/58/01/42580112421a4e6c882b99161dc66fac.js"></script>

<script src="https://pl29008911.profitablecpmratenetwork.com/89/77/df/8977dfc50dd57682e12207f675e13275.js"></script>
  
  <link rel="icon" type="image/png" href="Logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #c8f135;
      --accent-dim: #9ab825;
      --text: #f0f0f0;
      --muted: #666;
      --op-bg: #1e2a0e;
      --op-text: #c8f135;
      --eq-bg: #c8f135;
      --eq-text: #0e0e0e;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      padding: 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
    }

    .top-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding: 0 4px;
    }
    .top-label .brand {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .top-label .brand span { color: var(--accent); }
    .top-label .badge {
      font-size: 11px;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }

    .calc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(200, 241, 53, 0.04), 0 20px 60px rgba(0,0,0,0.5);
    }

    .display {
      padding: 1.5rem 1.5rem 1.25rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
    }
    .expr { font-size: 13px; color: var(--muted); min-height: 18px; text-align: right; word-break: break-all; letter-spacing: 0.5px; }
    .result {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      text-align: right;
      word-break: break-all;
      line-height: 1;
      transition: font-size 0.1s;
    }
    .result.sm { font-size: 28px; }
    .result.xs { font-size: 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    .btn {
      background: var(--surface);
      border: none;
      height: 72px;
      font-size: 18px;
      font-family: var(--font-mono);
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: #222; }
    .btn:active { background: #2a2a2a; transform: scale(0.94); }
    .btn.action { color: var(--muted); font-size: 15px; }
    .btn.action:hover { color: var(--text); }
    .btn.op { background: var(--op-bg); color: var(--op-text); font-size: 22px; font-weight: 500; }
    .btn.op:hover { background: #253510; }
    .btn.op.active-op { background: var(--accent); color: var(--eq-text); }
    .btn.equal { background: var(--eq-bg); color: var(--eq-text); font-size: 24px; font-weight: 700; }
    .btn.equal:hover { background: #d4f54a; }
    .btn.equal:active { background: #b8dc2e; }
    .btn.zero { grid-column: span 2; justify-content: flex-start; padding-left: 28px; }

    .history {
      margin-top: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
    }
    .hist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .hist-title { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .hist-clear { font-size: 11px; color: var(--accent-dim); cursor: pointer; background: none; border: none; font-family: var(--font-mono); letter-spacing: 0.5px; }
    .hist-clear:hover { color: var(--accent); }
    .hist-list { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
    .hist-list::-webkit-scrollbar { width: 3px; }
    .hist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    .hist-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: background 0.1s; }
    .hist-item:hover { background: var(--surface2); color: var(--text); }
    .hist-item .ans { color: var(--accent); font-weight: 500; }
    .empty { font-size: 12px; color: var(--muted); text-align: center; padding: 8px 0; opacity: 0.6; }

    .gh-footer { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.25rem; font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .gh-footer:hover { color: var(--text); }
    .gh-footer svg { width: 16px; height: 16px; fill: currentColor; }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="top-label">
    <div class="brand">calc<span>.</span></div>
    <div class="badge">v1.0.0</div>
  </div>

  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="grid">
      <button class="btn action" onclick="clearAll()">AC</button>
      <button class="btn action" onclick="toggleSign()">+/−</button>
      <button class="btn action" onclick="percent()">%</button>
      <button class="btn op" id="op-/" onclick="setOp('/')">÷</button>

      <button class="btn" onclick="inp('7')">7</button>
      <button class="btn" onclick="inp('8')">8</button>
      <button class="btn" onclick="inp('9')">9</button>
      <button class="btn op" id="op-*" onclick="setOp('*')">×</button>

      <button class="btn" onclick="inp('4')">4</button>
      <button class="btn" onclick="inp('5')">5</button>
      <button class="btn" onclick="inp('6')">6</button>
      <button class="btn op" id="op--" onclick="setOp('-')">−</button>

      <button class="btn" onclick="inp('1')">1</button>
      <button class="btn" onclick="inp('2')">2</button>
      <button class="btn" onclick="inp('3')">3</button>
      <button class="btn op" id="op-+" onclick="setOp('+')">+</button>

      <button class="btn zero" onclick="inp('0')">0</button>
      <button class="btn" onclick="inpDot()">.</button>
      <button class="btn equal" onclick="calculate()">=</button>
    </div>
  </div>

  <div class="history">
    <div class="hist-header">
      <div class="hist-title">History</div>
      <button class="hist-clear" onclick="clearHistory()">clear</button>
    </div>
    <div class="hist-list" id="hist-list">
      <div class="empty">Koi calculation nahi abhi tak</div>
    </div>
  </div>

  <footer style="margin-top: 25px; padding: 15px; text-align: center; font-family: var(--font-display);">
    <div style="margin-bottom: 8px; font-size: 13px; color: var(--text); opacity: 0.7;">
        &copy; 2026 Your Calculator
    </div>
    <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
        <a href="about-us.html" style="text-decoration: none; color: var(--accent); font-size: 12px;">About Us</a>
        <a href="contact-us.html" style="text-decoration: none; color: var(--accent); font-size: 12px;">Contact Us</a>
        <a href="privacy-policy.html" style="text-decoration: none; color: var(--accent); font-size: 12px;">Privacy Policy</a>
        <a href="terms.html" style="text-decoration: none; color: var(--accent); font-size: 12px;">Terms & Conditions</a>
    </div>
  </footer>
  
</div>

<script>
  let cur = '0', prev = '', op = null, reset = false, history = [];
  const sym = { '/': '÷', '*': '×', '-': '−', '+': '+' };

  function updateDisplay(exprText) {
    const r = document.getElementById('result');
    r.textContent = cur;
    r.className = 'result' + (cur.length > 12 ? ' xs' : cur.length > 9 ? ' sm' : '');
    document.getElementById('expr').textContent = exprText || '';
  }

  function clearOpHighlight() {
    document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active-op'));
  }

  function inp(v) {
    if (reset) { cur = v; reset = false; }
    else cur = (cur === '0') ? v : cur + v;
    if (cur.length > 13) cur = cur.slice(0, 13);
    clearOpHighlight();
    updateDisplay();
  }

  function inpDot() {
    if (reset) { cur = '0.'; reset = false; }
    else if (!cur.includes('.')) cur += '.';
    updateDisplay();
  }

  function setOp(o) {
    if (op && !reset) calculate(true);
    prev = cur; op = o; reset = true;
    clearOpHighlight();
    const btn = document.getElementById('op-' + o);
    if (btn) btn.classList.add('active-op');
    updateDisplay(prev + ' ' + sym[o]);
  }

  function calculate(chain) {
    if (!op || !prev) return;
    const a = parseFloat(prev), b = parseFloat(cur);
    const exprStr = prev + ' ' + sym[op] + ' ' + cur + ' =';
    let res;
    if (op === '+') res = a + b;
    else if (op === '-') res = a - b;
    else if (op === '*') res = a * b;
    else if (op === '/') res = b === 0 ? NaN : a / b;
    const resStr = isNaN(res) ? 'Error' : parseFloat(res.toFixed(10)).toString();
    if (!chain) addHistory(exprStr, resStr);
    cur = resStr; prev = ''; op = null; reset = true;
    clearOpHighlight();
    updateDisplay(chain ? '' : exprStr);
  }

  function clearAll() {
    cur = '0'; prev = ''; op = null; reset = false;
    clearOpHighlight();
    updateDisplay();
  }

  function toggleSign() {
    if (cur === '0' || cur === 'Error') return;
    cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
    updateDisplay();
  }

  function percent() {
    cur = String(parseFloat(cur) / 100);
    updateDisplay();
  }

  function addHistory(expr, res) {
    history.unshift({ expr, res });
    if (history.length > 8) history.pop();
    renderHistory();
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('hist-list');
    if (history.length === 0) {
      list.innerHTML = '<div class="empty">Koi calculation nahi abhi tak</div>';
      return;
    }
    list.innerHTML = history.map((h, i) =>
      `<div class="hist-item" onclick="loadHistory(${i})">
        <span>${h.expr}</span>
        <span class="ans">${h.res}</span>
      </div>`
    ).join('');
  }

  function loadHistory(i) {
    cur = history[i].res;
    reset = true;
    updateDisplay();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inp(e.key);
    else if (e.key === '.') inpDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (cur.length > 1) cur = cur.slice(0, -1);
      else cur = '0';
      updateDisplay();
    }
  });

  updateDisplay();
</script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker Registered'))
        .catch(err => console.log('Service Worker Error', err));
    });
  }
  </script>
  
</body>
  </html>
